<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <defs>
    <linearGradient id="bg-her" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9A7E28;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="vignette-her" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08)" />
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.4)" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="320" height="320" fill="url(#bg-her)" />
  <!-- Vignette -->
  <rect width="320" height="320" fill="url(#vignette-her)" />
  <!-- Initials -->
  <text
    x="160"
    y="185"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, serif"
    font-size="90"
    font-weight="700"
    fill="rgba(255,255,255,0.9)"
    letter-spacing="2"
  >H</text>
  <!-- Subtle border ring -->
  <rect x="1" y="1" width="318" height="318" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2" />
</svg>