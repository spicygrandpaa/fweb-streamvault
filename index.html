<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A private, personal streaming experience." />
  <meta name="robots" content="noindex, nofollow" />
  <title>F</title>

  <!-- Google Fonts: Cinematic pairing -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Core Styles (Mission 1 — DO NOT TOUCH) -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/loading.css" />
  <link rel="stylesheet" href="css/secret.css" />
  <link rel="stylesheet" href="css/profiles.css" />

  <!-- Mission 2 Styles (NEW) -->
  <link rel="stylesheet" href="css/homepage.css" />
  <link rel="stylesheet" href="css/media-player.css" />
  <link rel="stylesheet" href="css/story.css" />
  <link rel="stylesheet" href="css/secret-page.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════
       SCREEN 1: LOADING
       Mission 1 — DO NOT MODIFY
  ═══════════════════════════════════════════ -->
  <div id="screen-loading" class="screen screen--active" aria-label="Loading">

    <div class="loader" id="loader-root">

      <!-- The F letterform — JS animates and then slices this -->
      <div class="loader__f-stage" aria-hidden="true">
        <div class="loader__f-letter" id="loader-f">F</div>
      </div>

      <!-- Slice container — JS populates this for the collapse effect -->
      <div class="loader__slices" id="loader-slices" aria-hidden="true"></div>

      <!-- Film grain overlay -->
      <div class="loader__grain" aria-hidden="true"></div>

    </div>

  </div>

  <!-- ═══════════════════════════════════════════
       SCREEN 2: SECRET QUESTION
       Mission 1 — DO NOT MODIFY
  ═══════════════════════════════════════════ -->
  <div id="screen-secret" class="screen" aria-label="Verification">

    <!-- Ambient background orbs -->
    <div class="secret__bg" aria-hidden="true">
      <div class="secret__orb secret__orb--1"></div>
      <div class="secret__orb secret__orb--2"></div>
    </div>

    <div class="secret__container">

      <!-- Minimal F logo mark at top -->
      <div class="secret__logo" aria-label="F">F</div>

      <!-- Question card -->
      <div class="secret__card" role="main">
        <div class="secret__card-inner">

          <p class="secret__eyebrow">Prove it's you</p>
          <h1 class="secret__question" id="secret-question">
            <!-- Populated by JS from data/config.js -->
          </h1>

          <div class="secret__input-wrap">
            <input
              type="text"
              id="secret-answer"
              class="secret__input"
              placeholder="your answer..."
              autocomplete="off"
              spellcheck="false"
              aria-labelledby="secret-question"
              aria-describedby="secret-error"
            />
            <div class="secret__input-bar"></div>
          </div>

          <div class="secret__error" id="secret-error" role="alert" aria-live="assertive">
            <span class="secret__error-text"></span>
          </div>

          <button class="secret__btn" id="secret-submit" aria-label="Submit answer">
            <span class="secret__btn-text">Enter</span>
            <span class="secret__btn-arrow" aria-hidden="true">→</span>
          </button>

        </div>
      </div>

      <p class="secret__hint">Press Enter or click to continue</p>
    </div>

  </div>

  <!-- ═══════════════════════════════════════════
       SCREEN 3: WHO'S WATCHING
       Mission 1 — DO NOT MODIFY
       NOTE: src and alt are intentionally empty.
       populateProfiles() in profiles.js fills them
       from config.js at runtime.
  ═══════════════════════════════════════════ -->
  <div id="screen-profiles" class="screen" aria-label="Profile Selection">

    <div class="profiles__container">

      <h1 class="profiles__heading">Who's watching?</h1>

      <div class="profiles__grid" role="list">

        <!-- Profile: Neil -->
        <div class="profile-card" role="listitem" tabindex="0" data-profile="neil" aria-label="Neil's profile">
          <div class="profile-card__avatar-wrap">
            <div class="profile-card__avatar">
              <img
                src=""
                alt=""
                class="profile-card__img"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
              />
              <div class="profile-card__initials" style="display:none;">N</div>
            </div>
            <div class="profile-card__glow"></div>
          </div>
          <p class="profile-card__name"></p>
        </div>

        <!-- Profile: Fleur -->
        <div class="profile-card" role="listitem" tabindex="0" data-profile="fleur" aria-label="Fleur profile">
          <div class="profile-card__avatar-wrap">
            <div class="profile-card__avatar">
              <img
                src=""
                alt=""
                class="profile-card__img"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
              />
              <div class="profile-card__initials" style="display:none;">H</div>
            </div>
            <div class="profile-card__glow"></div>
          </div>
          <p class="profile-card__name"></p>
        </div>

        <!-- Profile: Us -->
        <div class="profile-card" role="listitem" tabindex="0" data-profile="us" aria-label="Us profile">
          <div class="profile-card__avatar-wrap">
            <div class="profile-card__avatar">
              <img
                src=""
                alt=""
                class="profile-card__img"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
              />
              <div class="profile-card__initials" style="display:none;">♥</div>
            </div>
            <div class="profile-card__glow"></div>
          </div>
          <p class="profile-card__name"></p>
        </div>

      </div>

    </div>

  </div>

  <!-- ═══════════════════════════════════════════
       SCREEN 4: PROFILE HOMEPAGE
       Mission 2 — built by profile-router.js
  ═══════════════════════════════════════════ -->
  <div id="screen-homepage" class="screen" aria-label="Profile Homepage">

    <!-- Top navigation bar -->
    <nav class="hp-nav" id="hp-nav">
      <!-- F logo — click 5× rapidly for the secret page -->
      <button class="hp-nav__f" id="hp-nav-f" aria-label="F">F</button>

      <div class="hp-nav__actions">
        <!-- Our Story button — only shown for the Us profile -->
        <button class="hp-nav__story" id="hp-nav-story" style="display:none;" aria-label="Our Story">
          Our Story
        </button>
        <!-- Back to profile selection -->
        <button class="hp-nav__back" id="hp-nav-back" aria-label="Switch profile">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
      </div>
    </nav>

    <!-- Hero section — populated by profile-router.js -->
    <section class="hp-hero" id="hp-hero" aria-label="Profile hero">
      <div class="hp-hero__slides" id="hp-hero-slides"></div>
      <div class="hp-hero__overlay" aria-hidden="true"></div>
      <div class="hp-hero__content" id="hp-hero-content"></div>
      <div class="hp-hero__dots" id="hp-hero-dots" aria-hidden="true"></div>
    </section>

    <!-- Content row — populated by profile-router.js -->
    <section class="hp-row-section" id="hp-row-section" aria-label="Content">
      <h2 class="hp-row-section__title" id="hp-row-title"></h2>
      <div class="hp-row" id="hp-row" role="list"></div>
    </section>

    <!-- Audio player bar — fixed at bottom -->
    <div class="audio-bar" id="audio-bar" aria-label="Music player">
      <div class="audio-bar__track">
        <span class="audio-bar__icon" aria-hidden="true">♪</span>
        <span class="audio-bar__title" id="audio-bar-title">—</span>
      </div>
      <div class="audio-bar__controls">
        <button class="audio-bar__btn" id="audio-play-btn" aria-label="Play / Pause">
          <span id="audio-play-icon">▶</span>
        </button>
        <input type="range" class="audio-bar__volume" id="audio-volume"
          min="0" max="1" step="0.02" value="0.5" aria-label="Volume" />
        <button class="audio-bar__btn" id="audio-mute-btn" aria-label="Mute / Unmute">
          <span id="audio-mute-icon">🔊</span>
        </button>
      </div>
    </div>

  </div>

  <!-- ═══════════════════════════════════════════
       SCREEN 5: OUR STORY TIMELINE
       Mission 2 — built by story-timeline.js
  ═══════════════════════════════════════════ -->
  <div id="screen-story" class="screen" aria-label="Our Story">
    <button class="story-back" id="story-back" aria-label="Back to homepage">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      Back
    </button>
    <!-- Timeline entries injected by story-timeline.js -->
    <div class="story-scroll" id="story-scroll"></div>
  </div>

  <!-- ═══════════════════════════════════════════
       SCREEN 6: SECRET EASTER EGG PAGE
       Mission 2 — built by secret-page.js
  ═══════════════════════════════════════════ -->
  <div id="screen-secret-page" class="screen" aria-label="Secret">
    <button class="secret-page__back" id="secret-page-back" aria-label="Back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    <div class="secret-page__f" aria-hidden="true">F</div>
    <!-- Card grid injected by secret-page.js -->
    <div class="secret-page__grid" id="secret-page-grid" role="list"></div>
  </div>

  <!-- ═══════════════════════════════════════════
       FULLSCREEN MEDIA PLAYER OVERLAY
       Sits above all screens. Toggled by media-player.js.
  ═══════════════════════════════════════════ -->
  <div id="media-player" class="media-player" aria-label="Media viewer" role="dialog" aria-modal="true" hidden>
    <button class="media-player__close" id="mp-close" aria-label="Close viewer">✕</button>

    <div class="media-player__stage" id="mp-stage"></div>

    <button class="media-player__nav media-player__nav--prev" id="mp-prev" aria-label="Previous">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    <button class="media-player__nav media-player__nav--next" id="mp-next" aria-label="Next">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>

    <!-- Video controls — shown only for videos -->
    <div class="media-player__controls" id="mp-controls" style="display:none;">
      <button class="media-player__ctrl-btn" id="mp-play" aria-label="Play / Pause">▶</button>
      <input type="range" class="media-player__volume" id="mp-volume"
        min="0" max="1" step="0.02" value="0.8" aria-label="Video volume" />
      <button class="media-player__ctrl-btn" id="mp-mute" aria-label="Mute / Unmute">🔊</button>
    </div>

    <div class="media-player__caption" id="mp-caption"></div>
  </div>

  <!-- ═══════════════════════════════════════════
       SCRIPTS
       Order matters. config → utils → core Mission 1
       → Mission 2 modules → bootstrap
  ═══════════════════════════════════════════ -->

  <!-- Mission 1 (DO NOT REORDER) -->
  <script src="data/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/screen-manager.js"></script>
  <script src="js/loading.js"></script>
  <script src="js/secret.js"></script>
  <script src="js/profiles.js"></script>

  <!-- Mission 2 (NEW — must come after profiles.js) -->
  <script src="js/audio-engine.js"></script>
  <script src="js/media-player.js"></script>
  <script src="js/profile-router.js"></script>
  <script src="js/story-timeline.js"></script>
  <script src="js/secret-page.js"></script>

  <!-- Bootstrap (always last) -->
  <script src="js/app.js"></script>

</body>
</html>
